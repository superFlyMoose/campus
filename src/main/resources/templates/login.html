<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户登录</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --brand-primary: #4f46e5;
            --brand-primary-dark: #3730a3;
            --brand-accent: #14b8a6;
            --text-strong: #0f172a;
            --text-muted: #64748b;
            --line-soft: rgba(99, 102, 241, 0.14);
            --shadow-soft: 0 28px 80px rgba(15, 23, 42, 0.16);
        }

        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(79, 70, 229, 0.24), transparent 34%),
                radial-gradient(circle at bottom right, rgba(20, 184, 166, 0.18), transparent 28%),
                linear-gradient(180deg, #eef2ff 0%, #f8fafc 100%);
            color: var(--text-strong);
        }

        .auth-layout {
            min-height: 100vh;
            padding: 2rem 0;
            display: flex;
            align-items: center;
        }

        .auth-shell {
            border-radius: 34px;
            border: 1px solid rgba(255,255,255,0.9);
            background: rgba(255,255,255,0.42);
            padding: 0.75rem;
            box-shadow: var(--shadow-soft);
        }

        .auth-panel,
        .brand-panel {
            border-radius: 28px;
            height: 100%;
        }

        .auth-panel {
            background: rgba(255,255,255,0.94);
            border: 1px solid var(--line-soft);
            padding: 2.4rem;
        }

        .brand-panel {
            background:
                radial-gradient(circle at top right, rgba(255,255,255,0.16), transparent 26%),
                linear-gradient(145deg, rgba(79, 70, 229, 0.96), rgba(30, 41, 59, 0.98));
            color: #fff;
            padding: 2.6rem;
            position: relative;
            overflow: hidden;
        }

        .brand-panel::after {
            content: "";
            position: absolute;
            inset: auto -10% -18% auto;
            width: 240px;
            height: 240px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.18), transparent 65%);
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            padding: 0.45rem 0.85rem;
            border-radius: 999px;
            background: rgba(255,255,255,0.10);
            border: 1px solid rgba(255,255,255,0.16);
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 1.25rem;
        }

        .brand-title {
            font-size: clamp(2rem, 3vw, 3rem);
            line-height: 1.08;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .brand-copy {
            color: rgba(255,255,255,0.78);
            font-size: 1rem;
            margin-bottom: 2rem;
        }

        .brand-list {
            display: grid;
            gap: 1rem;
            position: relative;
            z-index: 1;
        }

        .brand-item {
            padding: 1rem 1.1rem;
            border-radius: 20px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.08);
        }

        .brand-item strong {
            display: block;
            margin-bottom: 0.25rem;
        }

        .auth-kicker {
            color: var(--brand-primary);
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 0.75rem;
        }

        .auth-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.6rem;
        }

        .auth-copy {
            color: var(--text-muted);
            margin-bottom: 1.8rem;
        }

        .form-label {
            font-weight: 600;
            color: var(--text-strong);
            margin-bottom: 0.6rem;
        }

        .form-control {
            border-radius: 16px;
            border: 1px solid rgba(148, 163, 184, 0.28);
            padding: 0.9rem 1rem;
            box-shadow: none;
        }

        .form-control:focus {
            border-color: rgba(79, 70, 229, 0.45);
            box-shadow: 0 0 0 0.25rem rgba(79, 70, 229, 0.12);
        }

        .btn-premium {
            border: none;
            border-radius: 999px;
            padding: 0.9rem 1.25rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--brand-primary), #7c3aed);
            box-shadow: 0 18px 30px rgba(79, 70, 229, 0.22);
        }

        .btn-premium:hover,
        .btn-premium:focus {
            background: linear-gradient(135deg, var(--brand-primary-dark), #6d28d9);
        }

        .auth-link {
            color: var(--brand-primary);
            font-weight: 600;
            text-decoration: none;
        }

        .auth-link:hover {
            color: var(--brand-primary-dark);
        }

        .back-link {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
        }

        .back-link:hover {
            color: var(--brand-primary);
        }

        @media (max-width: 991.98px) {
            .brand-panel {
                min-height: 320px;
            }
        }

        @media (max-width: 767.98px) {
            .auth-layout {
                padding: 1rem 0;
            }

            .auth-panel,
            .brand-panel {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
<div class="container auth-layout">
    <div class="auth-shell w-100">
        <div class="row g-0 overflow-hidden rounded-5">
            <div class="col-lg-5">
                <div class="brand-panel d-flex flex-column justify-content-between">
                    <div>
                        <span class="eyebrow">Campus Activity</span>
                        <h1 class="brand-title">重新进入你的校园活动工作台。</h1>
                        <p class="brand-copy">快速查看活动动态、报名情况与个人参与记录，在统一入口中完成浏览、报名与管理</p>
                    </div>
                    <div class="brand-list">
                        <div class="brand-item">
                            <strong>发现活动</strong>
                            <span>第一时间获取校园内值得参与的活动信息</span>
                        </div>
                        <div class="brand-item">
                            <strong>统一管理</strong>
                            <span>组织者与管理员可在同一系统内管理活动与用户</span>
                        </div>
                        <div class="brand-item">
                            <strong>轻量高效</strong>
                            <span>保持操作直观，减少用户的查找成本</span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-7">
                <div class="auth-panel d-flex flex-column justify-content-center">
                    <a th:href="@{/}" class="back-link mb-4">← 返回首页</a>
                    <div class="auth-kicker">Account Access</div>
                    <h2 class="auth-title">用户登录</h2>
                    <p class="auth-copy">请输入账号信息以继续访问校园活动管理系统</p>
                    <div class="alert alert-danger border-0 rounded-4" th:if="${param.error}">
                        用户名或密码错误，请检查后重试！
                    </div>
                    <div class="alert alert-success border-0 rounded-4" th:if="${param.logout}">
                        已安全退出登录！
                    </div>
                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label class="form-label">用户名</label>
                            <input type="text" name="username" class="form-control" placeholder="请输入用户名">
                        </div>
                        <div class="mb-4">
                            <label class="form-label">密码</label>
                            <input type="password" name="password" class="form-control" placeholder="请输入密码">
                        </div>
                        <button type="submit" class="btn btn-premium text-white w-100">登录</button>
                    </form>
                    <div class="mt-4 text-center text-md-start">
                        <span class="text-muted">还没有账号？</span>
                        <a th:href="@{/register}" class="auth-link">立即注册</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>

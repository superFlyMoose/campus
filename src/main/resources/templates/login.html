<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户登录</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="min-height: 100vh;">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h3 class="text-center mb-4">用户登录</h3>
                    <div class="alert alert-danger mt-3" th:if="${param.error}">
                        用户名或密码错误，请检查后重试。
                    </div>
                    <div class="alert alert-success mt-3" th:if="${param.logout}">
                        已安全退出登录。
                    </div>
                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label class="form-label">用户名</label>
                            <input type="text" name="username" class="form-control" placeholder="请输入用户名">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">密码</label>
                            <input type="password" name="password" class="form-control" placeholder="请输入密码">
                        </div>
                        <button type="submit" class="btn btn-primary w-100">登录</button>
                    </form>
                    <div class="mt-3 text-center">
                        <a th:href="@{/register}" class="text-decoration-none">没有账号？立即注册</a>
                    </div>
                    <div class="alert alert-success mt-3 mb-0 small">
                        演示账号：admin / admin123，user / 123456
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>

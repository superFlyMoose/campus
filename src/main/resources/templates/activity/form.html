<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">活动表单</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <h3 class="mb-4" th:text="${pageTitle}">活动表单</h3>
                    <div class="alert alert-danger" th:if="${#fields.hasGlobalErrors()}" th:each="error : ${#fields.globalErrors()}" th:text="${error}">错误</div>
                    <form th:action="${formAction}" th:object="${activityForm}" method="post">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">活动名称</label>
                                <input type="text" th:field="*{title}" class="form-control">
                                <div class="text-danger small mt-1" th:errors="*{title}"></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">活动地点</label>
                                <input type="text" th:field="*{location}" class="form-control">
                                <div class="text-danger small mt-1" th:errors="*{location}"></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">开始时间</label>
                                <input type="datetime-local" th:field="*{startTime}" class="form-control">
                                <div class="text-danger small mt-1" th:errors="*{startTime}"></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">结束时间</label>
                                <input type="datetime-local" th:field="*{endTime}" class="form-control">
                                <div class="text-danger small mt-1" th:errors="*{endTime}"></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">人数上限</label>
                                <input type="number" th:field="*{maxPeople}" class="form-control">
                                <div class="text-danger small mt-1" th:errors="*{maxPeople}"></div>
                            </div>
                            <div class="col-12">
                                <label class="form-label">活动内容</label>
                                <textarea th:field="*{content}" rows="6" class="form-control"></textarea>
                                <div class="text-danger small mt-1" th:errors="*{content}"></div>
                            </div>
                        </div>
                        <div class="d-flex justify-content-between mt-4">
                            <a th:href="@{/activities}" class="btn btn-outline-secondary">返回列表</a>
                            <button type="submit" class="btn btn-primary">保存</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活动详情</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --brand-primary: #4f46e5;
            --brand-primary-dark: #3730a3;
            --brand-accent: #14b8a6;
            --text-strong: #0f172a;
            --text-muted: #64748b;
            --line-soft: rgba(99, 102, 241, 0.14);
            --surface: rgba(255,255,255,0.9);
            --shadow-soft: 0 24px 60px rgba(15, 23, 42, 0.08);
            --shadow-card: 0 18px 40px rgba(79, 70, 229, 0.12);
        }

        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(79, 70, 229, 0.16), transparent 30%),
                radial-gradient(circle at top right, rgba(20, 184, 166, 0.12), transparent 26%),
                linear-gradient(180deg, #f8faff 0%, #eef3ff 54%, #f8fafc 100%);
            color: var(--text-strong);
        }

        .hero-shell,
        .content-shell,
        .summary-shell {
            border-radius: 28px;
            border: 1px solid rgba(255,255,255,0.9);
            background: rgba(255,255,255,0.4);
            padding: 0.65rem;
            box-shadow: var(--shadow-soft);
        }

        .hero-panel,
        .content-panel,
        .summary-panel {
            border-radius: 22px;
            border: 1px solid var(--line-soft);
            background: var(--surface);
        }

        .hero-panel {
            padding: 2.4rem;
            background:
                radial-gradient(circle at top right, rgba(255,255,255,0.16), transparent 30%),
                linear-gradient(145deg, rgba(15, 23, 42, 0.98), rgba(79, 70, 229, 0.92));
            color: #fff;
            position: relative;
            overflow: hidden;
        }

        .hero-panel::after {
            content: "";
            position: absolute;
            inset: auto -8% -18% auto;
            width: 260px;
            height: 260px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.18), transparent 66%);
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            padding: 0.42rem 0.8rem;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.08);
            font-size: 0.76rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 1rem;
        }

        .hero-layout {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 1.5rem;
        }

        .hero-main {
            flex: 1 1 auto;
            min-width: 0;
        }

        .hero-title {
            font-size: clamp(2.2rem, 4vw, 3.6rem);
            line-height: 1.08;
            font-weight: 700;
            margin-bottom: 0.8rem;
            max-width: 760px;
        }

        .hero-copy {
            max-width: 640px;
            color: rgba(255,255,255,0.78);
            margin-bottom: 1.5rem;
        }

        .hero-actions {
            position: relative;
            z-index: 1;
        }

        .btn-pill {
            border-radius: 999px;
            padding: 0.85rem 1.25rem;
            font-weight: 700;
        }

        .btn-premium {
            border: none;
            background: linear-gradient(135deg, var(--brand-primary), #7c3aed);
            box-shadow: 0 16px 26px rgba(79, 70, 229, 0.24);
        }

        .btn-premium:hover,
        .btn-premium:focus {
            background: linear-gradient(135deg, var(--brand-primary-dark), #6d28d9);
        }

        .content-panel,
        .summary-panel {
            padding: 1.6rem;
            height: 100%;
        }

        .hero-image-wrap {
            width: 240px;
            height: 180px;
            flex: 0 0 240px;
            border-radius: 26px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.18);
            box-shadow: var(--shadow-card);
            position: relative;
            z-index: 1;
            align-self: flex-start;
        }

        .hero-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .summary-grid {
            display: grid;
            gap: 1rem;
        }

        .summary-item {
            padding: 1rem 1.1rem;
            border-radius: 18px;
            background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(238,242,255,0.86));
            border: 1px solid rgba(99, 102, 241, 0.08);
        }

        .summary-label {
            display: block;
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 0.35rem;
        }

        .summary-value {
            display: block;
            font-weight: 700;
            font-size: 1rem;
            color: var(--text-strong);
        }

        .section-kicker {
            color: var(--brand-primary);
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 700;
            margin-bottom: 0.6rem;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
        }

        .section-copy {
            color: var(--text-muted);
            margin-bottom: 1.5rem;
        }

        .content-box {
            border-radius: 22px;
            background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(248,250,255,0.92));
            border: 1px solid rgba(148, 163, 184, 0.18);
            padding: 1.5rem;
            color: #334155;
            line-height: 1.85;
            white-space: pre-line;
            flex: 1 1 auto;
        }

        .apply-box {
            border-radius: 22px;
            padding: 1.4rem;
            background: linear-gradient(135deg, rgba(79, 70, 229, 0.08), rgba(20, 184, 166, 0.08));
            border: 1px solid rgba(99, 102, 241, 0.12);
            margin-top: 1.5rem;
        }

        .apply-box p {
            color: var(--text-muted);
            margin-bottom: 1rem;
        }

        @media (max-width: 991.98px) {
            .hero-layout {
                flex-direction: column;
            }

            .hero-image-wrap {
                width: 100%;
                max-width: 320px;
                height: 220px;
                flex-basis: auto;
            }
        }

        @media (max-width: 767.98px) {
            .hero-panel,
            .content-panel,
            .summary-panel,
            .content-box,
            .apply-box {
                padding: 1.4rem;
            }
        }
    </style>
</head>
<body>
<div class="container py-4 py-lg-5">
    <div class="alert alert-success border-0 shadow-sm rounded-4" th:if="${successMessage}" th:text="${successMessage}">成功</div>
    <div class="alert alert-danger border-0 shadow-sm rounded-4" th:if="${errorMessage}" th:text="${errorMessage}">失败</div>

    <section class="hero-shell mb-4">
        <div class="hero-panel">
            <span class="eyebrow">Activity Detail</span>
            <div class="position-relative hero-layout" style="z-index: 1;">
                <div class="hero-main">
                    <h1 class="hero-title" th:text="${activity.title}">活动标题</h1>
                    <p class="hero-copy">查看活动时间、地点、人数信息与详细内容，帮助您第一时间了解详情</p>
                    <div class="hero-actions d-flex flex-column flex-sm-row gap-3">
                        <a th:href="@{/activities}" class="btn btn-light btn-pill">返回列表</a>
                        <button type="button" class="btn btn-secondary btn-pill" th:if="${hasRegistered}" disabled>已报名</button>
                        <button type="button" class="btn btn-secondary btn-pill" th:if="${!hasRegistered and !canRegister}" disabled>当前不可报名</button>
                        <form th:if="${!hasRegistered and canRegister}" th:action="@{|/registrations/activity/${activity.id}|}" method="post">
                            <button type="submit" class="btn btn-outline-light btn-pill">立即报名</button>
                        </form>
                    </div>
                </div>
                <div class="hero-image-wrap" th:if="${activity.imagePath != null and !#strings.isEmpty(activity.imagePath)}">
                    <img th:src="${activity.imagePath}" alt="活动主图" class="hero-image">
                </div>
            </div>
        </div>
    </section>

    <div class="row g-4 align-items-stretch">
        <div class="col-lg-8 d-flex">
            <section class="content-shell h-100 w-100">
                <div class="content-panel d-flex flex-column h-100">
                    <div class="section-kicker">活动介绍</div>
                    <h2 class="section-title">了解这场活动的核心内容</h2>
                    <p class="section-copy">在报名前先确认活动安排与参与价值，确保时间与地点都符合您的计划</p>
                    <div class="content-box" th:text="${activity.content}">活动内容</div>
                </div>
            </section>
        </div>
        <div class="col-lg-4 d-flex">
            <section class="summary-shell mb-4 h-100 w-100">
                <div class="summary-panel d-flex flex-column h-100">
                    <div class="section-kicker">活动摘要</div>
                    <h2 class="h4 fw-bold mb-4">关键信息</h2>
                    <div class="summary-grid">
                        <div class="summary-item">
                            <span class="summary-label">活动地点</span>
                            <span class="summary-value" th:text="${activity.location}">活动地点</span>
                        </div>
                        <div class="summary-item">
                            <span class="summary-label">开始时间</span>
                            <span class="summary-value" th:text="${#temporals.format(activity.startTime, 'yyyy-MM-dd HH:mm')}">开始时间</span>
                        </div>
                        <div class="summary-item">
                            <span class="summary-label">结束时间</span>
                            <span class="summary-value" th:text="${#temporals.format(activity.endTime, 'yyyy-MM-dd HH:mm')}">结束时间</span>
                        </div>
                        <div class="summary-item">
                            <span class="summary-label">报名人数</span>
                            <span class="summary-value"><span th:text="${activity.currentPeople}"></span>/<span th:text="${activity.maxPeople}"></span></span>
                        </div>
                    </div>
                    <div class="apply-box">
                        <h3 class="h5 fw-bold mb-2">准备参与这场活动？</h3>
                        <p th:if="${hasRegistered}">您已经报名过此活动，无需重复提交</p>
                        <p th:if="${!hasRegistered and !canRegister}">当前时间已超过活动开始时间或名额已满，暂不可报名</p>
                        <p th:if="${!hasRegistered and canRegister}">确认信息无误后可直接提交报名，系统将记录您的参与信息</p>
                        <button type="button" class="btn btn-secondary btn-pill w-100" th:if="${hasRegistered}" disabled>已报名</button>
                        <button type="button" class="btn btn-secondary btn-pill w-100" th:if="${!hasRegistered and !canRegister}" disabled>当前不可报名</button>
                        <form th:if="${!hasRegistered and canRegister}" th:action="@{|/registrations/activity/${activity.id}|}" method="post">
                            <button type="submit" class="btn btn-premium btn-pill text-white w-100">立即报名</button>
                        </form>
                    </div>
                </div>
            </section>
        </div>
    </div>
</div>
</body>
</html>

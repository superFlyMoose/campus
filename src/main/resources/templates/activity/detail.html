<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活动详情</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">活动详情</h2>
        <a th:href="@{/activities}" class="btn btn-outline-secondary">返回列表</a>
    </div>
    <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}">成功</div>
    <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}">失败</div>
    <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
            <h3 th:text="${activity.title}">活动标题</h3>
            <p class="text-secondary mb-2" th:text="${activity.location}">活动地点</p>
            <p>开始时间：<span th:text="${#temporals.format(activity.startTime, 'yyyy-MM-dd HH:mm')}"></span></p>
            <p>结束时间：<span th:text="${#temporals.format(activity.endTime, 'yyyy-MM-dd HH:mm')}"></span></p>
            <p>报名人数：<span th:text="${activity.currentPeople}"></span>/<span th:text="${activity.maxPeople}"></span></p>
            <div class="border rounded p-3 bg-light mb-3" th:text="${activity.content}">活动内容</div>
            <form th:action="@{|/registrations/activity/${activity.id}|}" method="post">
                <button type="submit" class="btn btn-primary">立即报名</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>

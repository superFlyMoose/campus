<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活动大厅</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">活动大厅</h2>
        <div class="d-flex gap-2 flex-wrap">
            <a th:href="@{/}" class="btn btn-outline-secondary">首页</a>
            <a th:href="@{/admin/dashboard}" class="btn btn-outline-dark" th:if="${#authorization.expression('hasRole(''ADMIN'')')}">管理端</a>
            <a th:href="@{/activities/admin/create}" class="btn btn-primary" th:if="${#authorization.expression('hasRole(''ADMIN'')')}">发布活动</a>
        </div>
    </div>
    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body">
            <form class="row g-3" method="get" th:action="@{/activities}">
                <div class="col-md-4">
                    <input type="text" name="keyword" th:value="${keyword}" class="form-control" placeholder="按活动名称搜索">
                </div>
                <div class="col-md-4">
                    <input type="text" name="location" th:value="${location}" class="form-control" placeholder="按活动地点搜索">
                </div>
                <div class="col-md-4 d-flex gap-2">
                    <button class="btn btn-primary" type="submit">搜索</button>
                    <a class="btn btn-outline-secondary" th:href="@{/activities}">重置</a>
                </div>
            </form>
        </div>
    </div>
    <div class="row g-4" th:if="${pageData.total > 0}">
        <div class="col-md-6 col-lg-4" th:each="activity : ${pageData.records}">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title" th:text="${activity.title}">活动标题</h5>
                    <p class="text-secondary mb-2" th:text="${activity.location}">地点</p>
                    <p class="small text-secondary" th:text="${#temporals.format(activity.startTime, 'yyyy-MM-dd HH:mm')} + ' 开始'">时间</p>
                    <p class="small text-secondary">报名人数：<span th:text="${activity.currentPeople}">0</span>/<span th:text="${activity.maxPeople}">0</span></p>
                    <div class="mt-auto d-flex gap-2 flex-wrap">
                        <a class="btn btn-sm btn-primary" th:href="@{|/activities/${activity.id}|}">查看详情</a>
                        <div class="d-flex gap-2 flex-wrap" th:if="${#authorization.expression('hasRole(''ADMIN'')')}">
                            <a class="btn btn-sm btn-outline-secondary" th:href="@{|/activities/admin/${activity.id}/edit|}">编辑</a>
                            <form th:action="@{|/activities/admin/${activity.id}/delete|}" method="post" onsubmit="return confirm('确认删除该活动吗？');">
                                <button type="submit" class="btn btn-sm btn-outline-danger">删除</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="alert alert-secondary" th:if="${pageData.total == 0}">暂无符合条件的活动。</div>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户注册</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-6">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h3 class="mb-4">用户注册</h3>
                    <div class="alert alert-danger" th:if="${#fields.hasGlobalErrors()}" th:each="error : ${#fields.globalErrors()}" th:text="${error}">错误信息</div>
                    <form th:action="@{/register}" th:object="${registerForm}" method="post">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">用户名</label>
                                <input type="text" th:field="*{username}" class="form-control" placeholder="唯一用户名">
                                <div class="text-danger small mt-1" th:errors="*{username}"></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">真实姓名</label>
                                <input type="text" th:field="*{realName}" class="form-control" placeholder="请输入真实姓名">
                                <div class="text-danger small mt-1" th:errors="*{realName}"></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">密码</label>
                                <input type="password" th:field="*{password}" class="form-control" placeholder="请输入密码">
                                <div class="text-danger small mt-1" th:errors="*{password}"></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">确认密码</label>
                                <input type="password" th:field="*{confirmPassword}" class="form-control" placeholder="请再次输入密码">
                                <div class="text-danger small mt-1" th:errors="*{confirmPassword}"></div>
                            </div>
                        </div>
                        <div class="d-flex justify-content-between mt-4">
                            <a th:href="@{/}" class="btn btn-outline-secondary">返回首页</a>
                            <button type="submit" class="btn btn-primary">提交注册</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">个人中心</h2>
        <a th:href="@{/}" class="btn btn-outline-primary">返回首页</a>
    </div>
    <div class="row g-4">
        <div class="col-lg-4">
            <div class="card border-0 shadow-sm">
                <div class="card-body">
                    <h5 class="mb-3">基本信息</h5>
                    <div class="text-center mb-3">
                        <img th:src="${currentUser.avatar != null && !currentUser.avatar.isEmpty() ? currentUser.avatar : 'https://via.placeholder.com/120x120?text=Avatar'}"
                             class="rounded-circle border" alt="头像" style="width: 120px; height: 120px; object-fit: cover;">
                    </div>
                    <form th:action="@{/files/avatar}" method="post" enctype="multipart/form-data" class="mb-3">
                        <input type="file" name="file" class="form-control mb-2" accept=".jpg,.jpeg,.png,.gif,.webp">
                        <button type="submit" class="btn btn-sm btn-primary w-100">上传头像</button>
                    </form>
                    <p class="mb-2">用户名：<span th:text="${currentUser.username}">username</span></p>
                    <p class="mb-2">真实姓名：<span th:text="${currentUser.realName}">realName</span></p>
                    <p class="mb-0">角色：<span th:text="${currentUser.role}">USER</span></p>
                </div>
            </div>
        </div>
        <div class="col-lg-8">
            <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}">成功</div>
            <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}">失败</div>
            <div class="card border-0 shadow-sm">
                <div class="card-body">
                    <h5 class="mb-3">我的报名</h5>
                    <div th:if="${#lists.isEmpty(registrations)}" class="text-secondary">暂无报名记录。</div>
                    <div class="table-responsive" th:if="${!#lists.isEmpty(registrations)}">
                        <table class="table align-middle">
                            <thead>
                            <tr>
                                <th>报名ID</th>
                                <th>活动ID</th>
                                <th>报名时间</th>
                                <th>操作</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="registration : ${registrations}">
                                <td th:text="${registration.id}">1</td>
                                <td th:text="${registration.activityId}">1</td>
                                <td th:text="${#temporals.format(registration.registrationTime, 'yyyy-MM-dd HH:mm')}">时间</td>
                                <td>
                                    <form th:action="@{|/registrations/${registration.id}/cancel|}" method="post">
                                        <button type="submit" class="btn btn-sm btn-outline-danger">取消报名</button>
                                    </form>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --brand-primary: #4f46e5;
            --brand-primary-dark: #3730a3;
            --brand-accent: #14b8a6;
            --text-strong: #0f172a;
            --text-muted: #64748b;
            --line-soft: rgba(99, 102, 241, 0.14);
            --surface: rgba(255,255,255,0.9);
            --shadow-soft: 0 24px 60px rgba(15, 23, 42, 0.08);
            --shadow-card: 0 18px 40px rgba(79, 70, 229, 0.12);
        }

        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(79, 70, 229, 0.16), transparent 30%),
                radial-gradient(circle at top right, rgba(20, 184, 166, 0.12), transparent 26%),
                linear-gradient(180deg, #f8faff 0%, #eef3ff 54%, #f8fafc 100%);
            color: var(--text-strong);
        }

        .hero-shell,
        .profile-shell,
        .table-shell,
        .state-shell,
        .summary-shell {
            border-radius: 28px;
            border: 1px solid rgba(255,255,255,0.9);
            background: rgba(255,255,255,0.4);
            padding: 0.65rem;
            box-shadow: var(--shadow-soft);
        }

        .hero-panel,
        .profile-panel,
        .table-panel,
        .state-panel,
        .summary-panel {
            border-radius: 22px;
            border: 1px solid var(--line-soft);
            background: var(--surface);
        }

        .hero-panel {
            padding: 2.2rem;
            background:
                radial-gradient(circle at top right, rgba(255,255,255,0.16), transparent 28%),
                linear-gradient(145deg, rgba(15, 23, 42, 0.98), rgba(79, 70, 229, 0.92));
            color: #fff;
            position: relative;
            overflow: hidden;
        }

        .hero-panel::after {
            content: "";
            position: absolute;
            inset: auto -8% -18% auto;
            width: 260px;
            height: 260px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.18), transparent 66%);
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            padding: 0.42rem 0.8rem;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.08);
            font-size: 0.76rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 1rem;
        }

        .hero-title {
            font-size: clamp(2rem, 4vw, 3.2rem);
            line-height: 1.08;
            font-weight: 700;
            margin-bottom: 0.75rem;
        }

        .hero-copy {
            color: rgba(255,255,255,0.78);
            max-width: 620px;
            margin-bottom: 1.35rem;
        }

        .btn-pill {
            border-radius: 999px;
            padding: 0.85rem 1.25rem;
            font-weight: 700;
        }

        .profile-panel,
        .table-panel,
        .state-panel,
        .summary-panel {
            padding: 1.5rem;
        }

        .profile-panel {
            background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(238,242,255,0.88));
            box-shadow: var(--shadow-card);
        }

        .avatar-wrap {
            width: 124px;
            height: 124px;
            border-radius: 50%;
            padding: 6px;
            margin: 0 auto 1rem;
            background: linear-gradient(135deg, rgba(79, 70, 229, 0.24), rgba(20, 184, 166, 0.24));
        }

        .avatar-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.92);
        }

        .identity-card {
            border-radius: 20px;
            background: rgba(255,255,255,0.72);
            border: 1px solid rgba(99, 102, 241, 0.08);
            padding: 1rem 1.05rem;
            margin-top: 1rem;
        }

        .identity-row {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            padding: 0.65rem 0;
            border-bottom: 1px solid rgba(148, 163, 184, 0.12);
        }

        .identity-row:last-child {
            border-bottom: 0;
            padding-bottom: 0;
        }

        .identity-row:first-child {
            padding-top: 0;
        }

        .identity-label {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .identity-value {
            font-weight: 700;
            color: var(--text-strong);
            text-align: right;
        }

        .form-control {
            min-height: 50px;
            border-radius: 16px;
            border: 1px solid rgba(148, 163, 184, 0.28);
            box-shadow: none;
        }

        .form-control:focus {
            border-color: rgba(79, 70, 229, 0.45);
            box-shadow: 0 0 0 0.25rem rgba(79, 70, 229, 0.12);
        }

        .section-head {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
            margin-bottom: 1.2rem;
        }

        .section-head h2 {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 0.35rem;
        }


        .summary-panel {
            background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(238,242,255,0.86));
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 1rem;
        }

        .summary-item {
            padding: 1rem 1.05rem;
            border-radius: 18px;
            background: rgba(255,255,255,0.8);
            border: 1px solid rgba(99, 102, 241, 0.08);
        }

        .summary-label {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 0.4rem;
            display: block;
        }

        .summary-value {
            font-size: 1.4rem;
            font-weight: 700;
        }

        .table-wrap {
            border-radius: 20px;
            border: 1px solid rgba(148, 163, 184, 0.14);
            overflow: hidden;
        }

        .table {
            margin-bottom: 0;
        }

        .table thead th {
            background: rgba(79, 70, 229, 0.06);
            color: #334155;
            font-size: 0.84rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            border-bottom-width: 1px;
            padding-top: 1rem;
            padding-bottom: 1rem;
        }

        .table > :not(caption) > * > * {
            padding: 1rem;
            border-bottom-color: rgba(148, 163, 184, 0.12);
        }

        .empty-panel {
            padding: 2rem;
            text-align: center;
            color: var(--text-muted);
        }

        @media (max-width: 991.98px) {
            .summary-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 767.98px) {
            .hero-panel,
            .profile-panel,
            .table-panel,
            .state-panel,
            .summary-panel,
            .empty-panel {
                padding: 1.35rem;
            }

            .section-head,
            .identity-row {
                flex-direction: column;
                align-items: flex-start;
            }

            .identity-value {
                text-align: left;
            }
        }
    </style>
</head>
<body>
<div class="container py-4 py-lg-5">
    <section class="hero-shell mb-4">
        <div class="hero-panel">
            <div class="position-relative" style="z-index: 1;">
                <span class="eyebrow">Personal Center</span>
                <h1 class="hero-title">个人中心</h1>
                <p class="hero-copy">集中查看个人资料与报名记录。</p>
                <a th:href="@{/}" class="btn btn-light btn-pill">返回首页</a>
            </div>
        </div>
    </section>

    <div class="row g-4 mb-4">
        <div class="col-lg-4">
            <section class="profile-shell h-100">
                <div class="profile-panel">
                    <h2 class="h4 fw-bold mb-3 text-center">基本信息</h2>
                    <div class="avatar-wrap">
                        <img th:src="${currentUser.avatar != null && !currentUser.avatar.isEmpty() ? currentUser.avatar : 'https://via.placeholder.com/120x120?text=Avatar'}"
                             alt="头像">
                    </div>
                    <form th:action="@{/files/avatar}" method="post" enctype="multipart/form-data" class="mb-3">
                        <input type="file" name="file" class="form-control mb-3" accept=".jpg,.jpeg,.png,.gif,.webp">
                        <button type="submit" class="btn btn-primary btn-pill w-100">上传头像</button>
                    </form>
                    <div class="identity-card">
                        <div class="identity-row">
                            <span class="identity-label">用户名</span>
                            <span class="identity-value" th:text="${currentUser.username}">username</span>
                        </div>
                        <div class="identity-row">
                            <span class="identity-label">真实姓名</span>
                            <span class="identity-value" th:text="${currentUser.realName}">realName</span>
                        </div>
                        <div class="identity-row">
                            <span class="identity-label">角色</span>
                            <span class="identity-value" th:text="${currentUser.role}">USER</span>
                        </div>
                    </div>
                </div>
            </section>
        </div>
        <div class="col-lg-8">
            <section class="summary-shell mb-4">
                <div class="summary-panel">
                    <div class="section-head">
                        <h2>参与概览</h2>
                    </div>
                    <div class="summary-grid">
                        <div class="summary-item">
                            <span class="summary-label">报名记录</span>
                            <span class="summary-value" th:text="${registrations.size()}">0</span>
                        </div>
                        <div class="summary-item">
                            <span class="summary-label">资料状态</span>
                            <span class="summary-value">已同步</span>
                        </div>
                        <div class="summary-item">
                            <span class="summary-label">当前角色</span>
                            <span class="summary-value" th:text="${currentUser.role}">USER</span>
                        </div>
                    </div>
                </div>
            </section>

            <div class="alert alert-success border-0 shadow-sm rounded-4" th:if="${successMessage}" th:text="${successMessage}">成功</div>
            <div class="alert alert-danger border-0 shadow-sm rounded-4" th:if="${errorMessage}" th:text="${errorMessage}">失败</div>

            <section class="table-shell" th:if="${!#lists.isEmpty(registrations)}">
                <div class="table-panel">
                    <div class="section-head">
                        <h2>我的报名</h2>
                    </div>
                    <div class="table-wrap table-responsive">
                        <table class="table align-middle">
                            <thead>
                            <tr>
                                <th>报名ID</th>
                                <th>活动ID</th>
                                <th>报名时间</th>
                                <th>操作</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="registration : ${registrations}">
                                <td th:text="${registration.id}">1</td>
                                <td th:text="${registration.activityId}">1</td>
                                <td th:text="${#temporals.format(registration.registrationTime, 'yyyy-MM-dd HH:mm')}">时间</td>
                                <td>
                                    <form th:action="@{|/registrations/${registration.id}/cancel|}" method="post">
                                        <button type="submit" class="btn btn-sm btn-outline-danger btn-pill">取消报名</button>
                                    </form>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>

            <section class="state-shell" th:if="${#lists.isEmpty(registrations)}">
                <div class="state-panel empty-panel">暂无报名记录。</div>
            </section>
        </div>
    </div>
</div>
</body>
</html>

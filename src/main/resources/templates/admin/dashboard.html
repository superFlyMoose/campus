<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理端首页</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .admin-shell {
            min-height: 100vh;
        }
        .admin-nav-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.85rem 1rem;
            border-radius: 0.75rem;
            color: #212529;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .admin-nav-link.active,
        .admin-nav-link:hover {
            background-color: #0d6efd;
            color: #fff;
        }
    </style>
</head>
<body class="bg-light">
<div class="container-fluid admin-shell py-4 px-3 px-lg-4">
    <div class="row g-4">
        <aside class="col-12 col-lg-3 col-xl-2">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body d-flex flex-column gap-4">
                    <div>
                        <p class="text-secondary small mb-2">管理后台</p>
                        <h3 class="mb-0">校园活动管理</h3>
                    </div>
                    <nav class="d-flex flex-column gap-2">
                        <a th:href="@{/admin/dashboard(tab='activity')}" class="admin-nav-link" th:classappend="${activeTab == 'activity'} ? ' active' : ''">
                            <span>活动管理</span>
                            <span>›</span>
                        </a>
                        <a th:href="@{/admin/dashboard(tab='users')}" class="admin-nav-link" th:classappend="${activeTab == 'users'} ? ' active' : ''">
                            <span>用户管理</span>
                            <span>›</span>
                        </a>
                    </nav>
                    <div class="mt-auto d-grid gap-2">
                        <a th:href="@{/activities/admin/create}" class="btn btn-primary">发布活动</a>
                        <a th:href="@{/}" class="btn btn-outline-secondary">返回系统首页</a>
                    </div>
                </div>
            </div>
        </aside>
        <main class="col-12 col-lg-9 col-xl-10">
            <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
                <div th:if="${activeTab == 'users'}">
                    <h2 class="mb-1">用户管理</h2>
                    <p class="text-secondary mb-0">左侧切换功能模块，右侧展示当前管理内容。</p>
                </div>
                <div th:if="${activeTab != 'users'}">
                    <h2 class="mb-1">活动管理</h2>
                    <p class="text-secondary mb-0">左侧切换功能模块，右侧展示当前管理内容。</p>
                </div>
                <div class="d-flex gap-2 flex-wrap">
                    <a th:if="${activeTab == 'users'}" th:href="@{/admin/users/create}" class="btn btn-primary">新增用户</a>
                    <a th:if="${activeTab != 'users'}" th:href="@{/activities}" class="btn btn-outline-primary">进入活动大厅</a>
                </div>
            </div>
            <div class="card border-0 shadow-sm">
                <div class="card-body">
                    <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}">成功</div>

                    <div th:if="${activeTab == 'users'}">
                        <div class="table-responsive" th:if="${userPage.total > 0}">
                            <table class="table align-middle mb-0">
                                <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>用户名</th>
                                    <th>真实姓名</th>
                                    <th>角色</th>
                                    <th>创建时间</th>
                                    <th>操作</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:each="user : ${userPage.records}">
                                    <td th:text="${user.id}">1</td>
                                    <td th:text="${user.username}">admin</td>
                                    <td th:text="${user.realName}">管理员</td>
                                    <td><span class="badge text-bg-dark" th:text="${user.role}">ADMIN</span></td>
                                    <td th:text="${#temporals.format(user.createTime, 'yyyy-MM-dd HH:mm')}">时间</td>
                                    <td>
                                        <div class="d-flex gap-2 flex-wrap">
                                            <a class="btn btn-sm btn-outline-primary" th:href="@{|/admin/users/${user.id}/edit|}">编辑</a>
                                            <form th:action="@{|/admin/users/${user.id}/delete|}" method="post" onsubmit="return confirm('确认删除该用户吗？');">
                                                <button type="submit" class="btn btn-sm btn-outline-danger">删除</button>
                                            </form>
                                        </div>
                                    </td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                        <div class="text-secondary py-4 text-center" th:if="${userPage.total == 0}">暂无用户数据。</div>
                    </div>

                    <div th:if="${activeTab != 'users'}">
                        <div class="table-responsive" th:if="${activityPage.total > 0}">
                            <table class="table align-middle mb-0">
                                <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>活动名称</th>
                                    <th>地点</th>
                                    <th>开始时间</th>
                                    <th>人数</th>
                                    <th>操作</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:each="activity : ${activityPage.records}">
                                    <td th:text="${activity.id}">1</td>
                                    <td th:text="${activity.title}">活动标题</td>
                                    <td th:text="${activity.location}">活动地点</td>
                                    <td th:text="${#temporals.format(activity.startTime, 'yyyy-MM-dd HH:mm')}">开始时间</td>
                                    <td>
                                        <span th:text="${activity.currentPeople}">0</span>/<span th:text="${activity.maxPeople}">0</span>
                                    </td>
                                    <td>
                                        <div class="d-flex gap-2 flex-wrap">
                                            <a class="btn btn-sm btn-outline-primary" th:href="@{|/activities/${activity.id}|}">查看</a>
                                            <a class="btn btn-sm btn-outline-secondary" th:href="@{|/activities/admin/${activity.id}/edit|}">编辑</a>
                                            <form th:action="@{|/activities/admin/${activity.id}/delete|}" method="post" onsubmit="return confirm('确认删除该活动吗？');">
                                                <button type="submit" class="btn btn-sm btn-outline-danger">删除</button>
                                            </form>
                                        </div>
                                    </td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                        <div class="text-secondary py-4 text-center" th:if="${activityPage.total == 0}">暂无活动数据。</div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>
</body>
</html>

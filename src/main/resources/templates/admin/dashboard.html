<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理端首页</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">管理端首页</h2>
        <div class="d-flex gap-2 flex-wrap">
            <a th:href="@{/admin/users}" class="btn btn-dark">用户管理</a>
            <a th:href="@{/activities/admin/create}" class="btn btn-primary">发布活动</a>
            <a th:href="@{/activities}" class="btn btn-outline-primary">管理活动</a>
        </div>
    </div>
    <div class="card border-0 shadow-sm">
        <div class="card-body">
            <p class="mb-2">当前版本已支持管理员创建、编辑、删除活动，以及用户列表与用户维护。</p>
            <p class="mb-0 text-secondary">后续继续扩展文件上传、统计图表、Redis 缓存与 RabbitMQ 通知。</p>
        </div>
    </div>
</div>
</body>
</html>

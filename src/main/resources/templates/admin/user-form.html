<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">用户表单</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <h3 class="mb-4" th:text="${pageTitle}">用户表单</h3>
                    <div class="alert alert-danger" th:if="${#fields.hasGlobalErrors()}" th:each="error : ${#fields.globalErrors()}" th:text="${error}">错误</div>
                    <form th:action="${formAction}" th:object="${userForm}" method="post">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">用户名</label>
                                <input type="text" th:field="*{username}" class="form-control">
                                <div class="text-danger small mt-1" th:errors="*{username}"></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">真实姓名</label>
                                <input type="text" th:field="*{realName}" class="form-control">
                                <div class="text-danger small mt-1" th:errors="*{realName}"></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">角色</label>
                                <select th:field="*{role}" class="form-select">
                                    <option value="USER">USER</option>
                                    <option value="ADMIN">ADMIN</option>
                                </select>
                                <div class="text-danger small mt-1" th:errors="*{role}"></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">密码</label>
                                <input type="password" th:field="*{password}" class="form-control" placeholder="编辑时留空表示不修改">
                                <div class="text-danger small mt-1" th:errors="*{password}"></div>
                            </div>
                        </div>
                        <div class="d-flex justify-content-between mt-4">
                            <a th:href="@{/admin/users}" class="btn btn-outline-secondary">返回列表</a>
                            <button type="submit" class="btn btn-primary">保存</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">用户表单</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --brand-primary: #4f46e5;
            --brand-primary-dark: #3730a3;
            --text-strong: #0f172a;
            --text-muted: #64748b;
            --line-soft: rgba(99, 102, 241, 0.14);
            --surface: rgba(255,255,255,0.9);
            --shadow-soft: 0 24px 60px rgba(15, 23, 42, 0.08);
        }

        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(79, 70, 229, 0.16), transparent 30%),
                radial-gradient(circle at top right, rgba(20, 184, 166, 0.12), transparent 26%),
                linear-gradient(180deg, #f8faff 0%, #eef3ff 54%, #f8fafc 100%);
            color: var(--text-strong);
        }

        .page-shell,
        .form-shell,
        .group-shell {
            border-radius: 28px;
            border: 1px solid rgba(255,255,255,0.9);
            background: rgba(255,255,255,0.4);
            padding: 0.65rem;
            box-shadow: var(--shadow-soft);
        }

        .page-panel,
        .form-panel,
        .group-panel {
            border-radius: 22px;
            border: 1px solid var(--line-soft);
            background: var(--surface);
        }

        .page-panel {
            padding: 2.2rem;
            background:
                radial-gradient(circle at top right, rgba(255,255,255,0.14), transparent 28%),
                linear-gradient(145deg, rgba(15, 23, 42, 0.98), rgba(79, 70, 229, 0.92));
            color: #fff;
            position: relative;
            overflow: hidden;
        }

        .page-panel::after {
            content: "";
            position: absolute;
            inset: auto -10% -20% auto;
            width: 240px;
            height: 240px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.18), transparent 68%);
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            padding: 0.42rem 0.8rem;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.08);
            font-size: 0.76rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 1rem;
        }

        .page-title {
            font-size: clamp(2rem, 4vw, 3.2rem);
            line-height: 1.08;
            font-weight: 700;
            margin-bottom: 0.75rem;
        }

        .page-copy {
            color: rgba(255,255,255,0.76);
            max-width: 640px;
            margin-bottom: 0;
        }

        .form-panel {
            padding: 1.75rem;
        }

        .group-panel {
            padding: 1.35rem;
            background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(238,242,255,0.84));
        }

        .group-title {
            font-size: 1.08rem;
            font-weight: 700;
            margin-bottom: 0.35rem;
        }

        .group-copy {
            color: var(--text-muted);
            margin-bottom: 1.1rem;
        }

        .form-label {
            font-weight: 600;
            margin-bottom: 0.6rem;
        }

        .form-control,
        .form-select {
            min-height: 52px;
            border-radius: 16px;
            border: 1px solid rgba(148, 163, 184, 0.28);
            box-shadow: none;
            padding: 0.9rem 1rem;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: rgba(79, 70, 229, 0.45);
            box-shadow: 0 0 0 0.25rem rgba(79, 70, 229, 0.12);
        }

        .btn-pill {
            border-radius: 999px;
            padding: 0.85rem 1.25rem;
            font-weight: 700;
        }

        .btn-premium {
            border: none;
            background: linear-gradient(135deg, var(--brand-primary), #7c3aed);
            box-shadow: 0 16px 26px rgba(79, 70, 229, 0.24);
        }

        .btn-premium:hover,
        .btn-premium:focus {
            background: linear-gradient(135deg, var(--brand-primary-dark), #6d28d9);
        }

        .text-danger.small {
            margin-top: 0.45rem !important;
        }

        @media (max-width: 767.98px) {
            .page-panel,
            .form-panel,
            .group-panel {
                padding: 1.35rem;
            }
        }
    </style>
</head>
<body>
<div class="container py-4 py-lg-5">
    <section class="page-shell mb-4">
        <div class="page-panel">
            <span class="eyebrow">User Editor</span>
            <h1 class="page-title" th:text="${pageTitle}">用户表单</h1>
            <p class="page-copy">在保持现有权限与后端逻辑不变的前提下，维护用户账号、姓名、角色与密码信息。</p>
        </div>
    </section>

    <div class="row justify-content-center">
        <div class="col-xl-8">
            <section class="form-shell">
                <div class="form-panel">
                    <div class="alert alert-danger border-0 rounded-4" th:if="${#fields.hasGlobalErrors()}" th:each="error : ${#fields.globalErrors()}" th:text="${error}">错误</div>
                    <form th:action="${formAction}" th:object="${userForm}" method="post">
                        <div class="group-shell mb-3">
                            <div class="group-panel">
                                <div class="group-title">基础资料</div>
                                <div class="group-copy">填写用户名与真实姓名，确保后台列表与账号识别信息保持清晰。</div>
                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <label class="form-label">用户名</label>
                                        <input type="text" th:field="*{username}" class="form-control">
                                        <div class="text-danger small mt-1" th:errors="*{username}"></div>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label">真实姓名</label>
                                        <input type="text" th:field="*{realName}" class="form-control">
                                        <div class="text-danger small mt-1" th:errors="*{realName}"></div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="group-shell mb-4">
                            <div class="group-panel">
                                <div class="group-title">角色与安全</div>
                                <div class="group-copy">维持既有角色枚举和密码提交规则，编辑状态下留空仍表示不修改密码。</div>
                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <label class="form-label">角色</label>
                                        <select th:field="*{role}" class="form-select">
                                            <option value="USER">USER</option>
                                            <option value="ADMIN">ADMIN</option>
                                        </select>
                                        <div class="text-danger small mt-1" th:errors="*{role}"></div>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label">密码</label>
                                        <input type="password" th:field="*{password}" class="form-control" placeholder="编辑时留空表示不修改">
                                        <div class="text-danger small mt-1" th:errors="*{password}"></div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="d-flex flex-column flex-sm-row justify-content-between gap-3">
                            <a th:href="@{/admin/users}" class="btn btn-outline-secondary btn-pill">返回列表</a>
                            <button type="submit" class="btn btn-premium btn-pill text-white">保存</button>
                        </div>
                    </form>
                </div>
            </section>
        </div>
    </div>
</div>
</body>
</html>

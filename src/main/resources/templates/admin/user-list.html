<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">用户管理</h2>
        <div class="d-flex gap-2">
            <a th:href="@{/admin/dashboard}" class="btn btn-outline-secondary">返回后台</a>
            <a th:href="@{/admin/users/create}" class="btn btn-primary">新增用户</a>
        </div>
    </div>
    <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}">成功</div>
    <div class="card border-0 shadow-sm">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table align-middle">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>用户名</th>
                        <th>真实姓名</th>
                        <th>角色</th>
                        <th>创建时间</th>
                        <th>操作</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="user : ${pageData.records}">
                        <td th:text="${user.id}">1</td>
                        <td th:text="${user.username}">admin</td>
                        <td th:text="${user.realName}">管理员</td>
                        <td><span class="badge text-bg-dark" th:text="${user.role}">ADMIN</span></td>
                        <td th:text="${#temporals.format(user.createTime, 'yyyy-MM-dd HH:mm')}">时间</td>
                        <td>
                            <div class="d-flex gap-2">
                                <a class="btn btn-sm btn-outline-primary" th:href="@{|/admin/users/${user.id}/edit|}">编辑</a>
                                <form th:action="@{|/admin/users/${user.id}/delete|}" method="post">
                                    <button type="submit" class="btn btn-sm btn-outline-danger">删除</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
